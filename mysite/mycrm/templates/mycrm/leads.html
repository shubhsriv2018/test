{% extends 'mycrm/base.html' %}

{% block content %}

<style>

    body{
        background:#f4f7fb;
        font-family:Arial, Helvetica, sans-serif;
    }

    .container{
        width:90%;
        margin:40px auto;
    }

    .card{
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    .header h2{
        color:#2563eb;
        margin-bottom:8px;
    }

    .header p{
        color:#666;
        margin-bottom:30px;
    }

    .stats{
        display:flex;
        gap:20px;
        flex-wrap:wrap;
    }

    .stat-card{
        width:260px;
        background:linear-gradient(135deg,#2563eb,#3b82f6);
        color:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(37,99,235,.25);
        transition:.3s;
    }

    .stat-card:hover{
        transform:translateY(-5px);
    }

    .stat-card h3{
        margin:0;
        font-size:18px;
        font-weight:normal;
    }

    .stat-card .number{
        font-size:42px;
        font-weight:bold;
        margin-top:12px;
    }

    .btn{
        display:inline-block;
        margin-top:30px;
        padding:12px 22px;
        background:#6b7280;
        color:white;
        text-decoration:none;
        border-radius:8px;
        font-weight:bold;
        transition:.3s;
    }

    .btn:hover{
        background:#4b5563;
    }

</style>

<div class="container">

    <div class="card">

        <div class="header">
            <h2>📈 Leads Dashboard</h2>
            <p>Overview of your CRM lead statistics.</p>
        </div>

        <div class="stats">

            <div class="stat-card">
                <h3>👥 Total Customers</h3>
                <div class="number">
                    {{ total_customers }}
                </div>
            </div>

        </div>

        <a href="{% url 'index' %}" class="btn">
            ← Back to Dashboard
        </a>

    </div>

</div>

{% endblock %}
