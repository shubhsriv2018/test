{% extends 'mycrm/base.html' %}

{% block content %}

<style>

    body{
        background:#f4f7fb;
        font-family:Arial, Helvetica, sans-serif;
    }

    .container{
        width:100%;
        display:flex;
        justify-content:center;
        margin-top:50px;
    }

    .card{
        width:500px;
        background:white;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .card h2{
        text-align:center;
        color:#2563eb;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#666;
        margin-bottom:30px;
    }

    form p{
        margin-bottom:18px;
    }

    form label{
        display:block;
        font-weight:bold;
        margin-bottom:6px;
        color:#444;
    }

    form input,
    form select,
    form textarea{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:15px;
        transition:.3s;
    }

    form input:focus,
    form select:focus,
    form textarea:focus{
        outline:none;
        border-color:#2563eb;
        box-shadow:0 0 8px rgba(37,99,235,.2);
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:25px;
    }

    .btn{
        padding:12px 25px;
        border:none;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    .btn-save{
        background:#2563eb;
        color:white;
    }

    .btn-save:hover{
        background:#1d4ed8;
        transform:translateY(-2px);
    }

    .btn-back{
        background:#6b7280;
        color:white;
    }

    .btn-back:hover{
        background:#4b5563;
    }

</style>

<div class="container">

    <div class="card">

        <h2>➕ Add New Customer</h2>
        <p class="subtitle">
            Fill in the customer details below.
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="buttons">

                <button class="btn btn-save" type="submit">
                    💾 Save Customer
                </button>

                <a href="{% url 'index' %}" class="btn btn-back">
                    ← Back
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
